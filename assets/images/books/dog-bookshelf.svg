<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#FAF7F2"/>
  <!-- Tall bookshelf right side -->
  <rect x="380" y="0" width="220" height="400" fill="#8B5E3C"/>
  <rect x="380" y="80" width="220" height="12" fill="#6F4E37"/>
  <rect x="380" y="172" width="220" height="12" fill="#6F4E37"/>
  <rect x="380" y="264" width="220" height="12" fill="#6F4E37"/>
  <!-- Books on shelves -->
  <rect x="390" y="84" width="18" height="88" fill="#8B0000" rx="1"/>
  <rect x="412" y="90" width="22" height="82" fill="#1a3a6b" rx="1"/>
  <rect x="438" y="84" width="16" height="88" fill="#2d6b2d" rx="1"/>
  <rect x="458" y="90" width="20" height="82" fill="#D4AF37" rx="1"/>
  <rect x="482" y="84" width="18" height="88" fill="#6b2d6b" rx="1"/>
  <rect x="504" y="88" width="22" height="84" fill="#C4A484" rx="1"/>
  <rect x="390" y="176" width="22" height="88" fill="#6b2d6b" rx="1"/>
  <rect x="416" y="180" width="18" height="84" fill="#8B0000" rx="1"/>
  <rect x="438" y="176" width="24" height="88" fill="#C4A484" rx="1"/>
  <rect x="466" y="180" width="20" height="84" fill="#2d6b2d" rx="1"/>
  <rect x="390" y="268" width="18" height="88" fill="#2d6b2d" rx="1"/>
  <rect x="412" y="272" width="22" height="84" fill="#8B0000" rx="1"/>
  <!-- Magnifying glass -->
  <circle cx="345" cy="175" r="45" fill="none" stroke="#8B5E3C" stroke-width="8"/>
  <circle cx="345" cy="175" r="38" fill="#EADBC8" opacity="0.4"/>
  <line x1="380" y1="210" x2="415" y2="242" stroke="#8B5E3C" stroke-width="10" stroke-linecap="round"/>
  <!-- Husky dog body -->
  <ellipse cx="210" cy="305" rx="80" ry="60" fill="#EADBC8"/>
  <ellipse cx="210" cy="288" rx="60" ry="42" fill="#C4C4C4"/>
  <ellipse cx="210" cy="280" rx="40" ry="30" fill="#666"/>
  <!-- Head -->
  <circle cx="210" cy="228" r="58" fill="#EADBC8"/>
  <ellipse cx="210" cy="242" rx="36" ry="28" fill="#FAF7F2"/>
  <!-- Grey mask -->
  <ellipse cx="193" cy="218" rx="28" ry="20" fill="#888"/>
  <ellipse cx="227" cy="218" rx="28" ry="20" fill="#888"/>
  <!-- Pointed ears -->
  <polygon points="174,182 189,212 162,210" fill="#888"/>
  <polygon points="246,182 260,212 233,210" fill="#888"/>
  <polygon points="177,186 189,208 166,206" fill="#E8916A" opacity="0.5"/>
  <polygon points="243,186 258,208 228,208" fill="#E8916A" opacity="0.5"/>
  <!-- Icy blue eyes -->
  <circle cx="192" cy="218" r="13" fill="#87CEEB"/>
  <circle cx="228" cy="218" r="13" fill="#87CEEB"/>
  <circle cx="192" cy="218" r="8" fill="#2B1810"/>
  <circle cx="228" cy="218" r="8" fill="#2B1810"/>
  <circle cx="194" cy="215" r="4" fill="white"/>
  <circle cx="230" cy="215" r="4" fill="white"/>
  <!-- Nose -->
  <ellipse cx="210" cy="242" rx="12" ry="8" fill="#2B1810"/>
  <!-- Mouth -->
  <path d="M200 252 Q210 260 220 252" fill="none" stroke="#9B5A2A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Reading glasses -->
  <circle cx="190" cy="218" r="16" fill="none" stroke="#6F4E37" stroke-width="2.5"/>
  <circle cx="228" cy="218" r="16" fill="none" stroke="#6F4E37" stroke-width="2.5"/>
  <line x1="206" y1="218" x2="212" y2="218" stroke="#6F4E37" stroke-width="2.5"/>
  <!-- Open book in paw -->
  <ellipse cx="290" cy="272" rx="32" ry="24" fill="#EADBC8"/>
  <rect x="275" y="248" width="90" height="65" rx="8" fill="#FAF7F2"/>
  <rect x="318" y="248" width="6" height="65" fill="#C4A484"/>
  <line x1="283" y1="265" x2="312" y2="265" stroke="#C4A484" stroke-width="1.5" opacity="0.6"/>
  <line x1="283" y1="275" x2="312" y2="275" stroke="#C4A484" stroke-width="1.5" opacity="0.6"/>
  <line x1="283" y1="285" x2="312" y2="285" stroke="#C4A484" stroke-width="1.5" opacity="0.6"/>
  <line x1="326" y1="265" x2="355" y2="265" stroke="#C4A484" stroke-width="1.5" opacity="0.6"/>
  <line x1="326" y1="275" x2="355" y2="275" stroke="#C4A484" stroke-width="1.5" opacity="0.6"/>
  <!-- Fluffy tail -->
  <path d="M138 340 Q100 310 90 280 Q82 250 100 240" fill="none" stroke="#EADBC8" stroke-width="22" stroke-linecap="round"/>
  <path d="M138 340 Q100 310 90 280 Q82 250 100 240" fill="none" stroke="#C4C4C4" stroke-width="12" stroke-linecap="round"/>
</svg>
