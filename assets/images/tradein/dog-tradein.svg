<svg xmlns=http://www.w3.org/2000/svg viewBox=0 0 600 400 width=600 height=400>
  <rect width=600 height=400 fill=#EADBC8/>
  <!-- Counter/desk -->
  <rect x=0 y=310 width=600 height=90 fill=#8B5E3C/>
  <rect x=0 y=305 width=600 height=10 fill=#6F4E37/>
  <!-- Stack of books being traded in (left side) -->
  <rect x=60 y=265 width=95 height=22 rx=4 fill=#8B0000/>
  <rect x=65 y=245 width=88 height=22 rx=4 fill=#1a3a6b/>
  <rect x=58 y=225 width=98 height=22 rx=4 fill=#2d6b2d/>
  <rect x=63 y=205 width=92 height=22 rx=4 fill=#6b2d6b/>
  <rect x=60 y=185 width=95 height=22 rx=4 fill=#8B6343/>
  <!-- Store credit label -->
  <rect x=420 y=248 width=130 height=58 rx=10 fill=#6F4E37/>
  <text x=485 y=270 text-anchor=middle font-family=Georgia font-size=11 fill=#EADBC8>Store Credit</text>
  <text x=485 y=290 text-anchor=middle font-family=Georgia font-size=18 fill=#C4A484 font-weight=bold>.50</text>
  <!-- Boxer dog at counter -->
  <!-- Body -->
  <ellipse cx=295 cy=300 rx=75 ry=52 fill=#C4855A/>
  <!-- Head - boxer brachycephalic face -->
  <circle cx=295 cy=235 r=58 fill=#C4855A/>
  <!-- White muzzle/chest patch -->
  <ellipse cx=295 cy=252 rx=35 ry=28 fill=#FAF7F2/>
  <!-- Floppy ears -->
  <ellipse cx=248 cy=222 rx=20 ry=40 fill=#A06B45 transform=rotate(-15 248 222)/>
  <ellipse cx=342 cy=222 rx=20 ry=40 fill=#A06B45 transform=rotate(15 342 222)/>
  <!-- Eyes boxer big round eyes -->
  <circle cx=278 cy=225 r=12 fill=#2B1810/>
  <circle cx=312 cy=225 r=12 fill=#2B1810/>
  <circle cx=281 cy=221 r=5 fill=white/>
  <circle cx=315 cy=221 r=5 fill=white/>
  <circle cx=282 cy=222 r=2.5 fill=black/>
  <circle cx=316 cy=222 r=2.5 fill=black/>
  <!-- Boxer snout shorter/flat -->
  <ellipse cx=295 cy=248 rx=22 ry=16 fill=#A06B45/>
  <!-- Nose -->
  <ellipse cx=295 cy=240 rx=14 ry=9 fill=#2B1810/>
  <ellipse cx=292 cy=238 rx=5 ry=3 fill=#444 opacity=0.4/>
  <!-- Mouth -->
  <path d=M280 258 Q295 270 310 258 fill=none stroke=#9B5A2A stroke-width=2.5 stroke-linecap=round/>
  <!-- Winkle/wrinkle on forehead -->
  <path d=M278 208 Q295 203 312 208 fill=none stroke=#A06B45 stroke-width=2 opacity=0.5/>
  <path d=M280 215 Q295 210 310 215 fill=none stroke=#A06B45 stroke-width=2 opacity=0.5/>
  <!-- Big paws on counter -->
  <ellipse cx=220 cy=310 rx=42 ry=26 fill=#C4855A/>
  <ellipse cx=370 cy=310 rx=42 ry=26 fill=#C4855A/>
  <!-- Paw toes -->
  <circle cx=205 cy=300 r=9 fill=#A06B45/>
  <circle cx=218 cy=294 r=9 fill=#A06B45/>
  <circle cx=233 cy=294 r=9 fill=#A06B45/>
  <circle cx=357 cy=294 r=9 fill=#A06B45/>
  <circle cx=372 cy=294 r=9 fill=#A06B45/>
  <circle cx=385 cy=300 r=9 fill=#A06B45/>
  <!-- Enthusiastic tail blur -->
  <path d=M360 310 Q395 290 415 265 fill=none stroke=#C4855A stroke-width=20 stroke-linecap=round opacity=0.6/>
  <path d=M360 310 Q390 285 408 262 fill=none stroke=#C4855A stroke-width=20 stroke-linecap=round opacity=0.4/>
  <!-- Paw print stamp on counter -->
  <circle cx=490 cy=330 r=8 fill=#6F4E37 opacity=0.4/>
  <circle cx=478 cy=320 r=5 fill=#6F4E37 opacity=0.4/>
  <circle cx=490 cy=316 r=5 fill=#6F4E37 opacity=0.4/>
  <circle cx=502 cy=320 r=5 fill=#6F4E37 opacity=0.4/>
</svg>
