<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Sign in to your Folio & Froth rewards account.">
  <meta name="theme-color" content="#6F4E37">
  <title>Login | Folio & Froth</title>

  <link rel="icon" type="image/png" href="images/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Inter', sans-serif;
      min-height: 100%;
    }

    /* ── PAGE BG ── */
    .page-bg {
      min-height: 100vh;
      background:
        linear-gradient(rgba(15, 8, 3, 0.65), rgba(15, 8, 3, 0.70)),
        url('images/home_hero.jpg') center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
    }
    @media (min-width: 768px) {
      .page-bg {
        height: 100vh;
        overflow: hidden;
      }
    }

    /* ── TOP-RIGHT CORNER ICONS ── */
    /* Desktop (≥992px): show dark + LTR icons, hide hamburger */
    /* Mobile/Tablet (<992px): show hamburger ONLY, hide dark+LTR */
    .top-right-actions {
      position: fixed;
      top: 1rem;
      right: 1.2rem;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* On mobile/tablet: hide dark+LTR, show hamburger */
    @media (max-width: 991.98px) {
      .tr-desktop-only { display: none !important; }
      #menuToggle { display: flex !important; }
    }
    /* On desktop: hide hamburger, show dark+LTR */
    @media (min-width: 992px) {
      #menuToggle { display: none !important; }
      #navDropdown { display: none !important; }
    }

    .tr-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid rgba(196,164,132,0.5);
      background: rgba(20, 10, 4, 0.80);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: #C4A484;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s, border-color 0.25s;
    }

    .tr-ltr {
      border-radius: 20px;
      padding: 0 0.85rem;
      width: auto;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      gap: 0.35rem;
      white-space: nowrap;
    }
    .tr-ltr i { font-size: 0.85rem; }

    /* ── NAV DROPDOWN ── */
    .nav-dropdown {
      position: fixed;
      top: 3.8rem;
      right: 1.2rem;
      z-index: 9998;
      background: rgba(18, 9, 3, 0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(196,164,132,0.30);
      border-radius: 16px;
      padding: 0.8rem;
      min-width: 220px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.60);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px) scale(0.97);
      transform-origin: top right;
      transition: opacity 0.25s, transform 0.25s, visibility 0.25s;
    }
    .nav-dropdown.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    /* Utility row inside dropdown (dark + ltr toggle) */
    .nd-util-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.6rem 0.6rem;
      border-bottom: 1px solid rgba(196,164,132,0.15);
      margin-bottom: 0.5rem;
    }
    .nd-util-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.45rem 0.7rem;
      border-radius: 8px;
      border: 1px solid rgba(196,164,132,0.25);
      background: rgba(196,164,132,0.08);
      color: #C4A484;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .nd-util-btn:hover {
      background: rgba(196,164,132,0.18);
      color: #fff;
    }
    .nd-util-btn i { font-size: 0.82rem; }

    .nd-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(196,164,132,0.5);
      padding: 0 0.5rem 0.5rem;
      display: block;
    }

    .nav-dropdown a {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.48rem 0.65rem;
      color: rgba(234,219,200,0.85);
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 500;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }
    .nav-dropdown a i {
      width: 16px;
      text-align: center;
      font-size: 0.8rem;
      color: #C4A484;
    }
    .nav-dropdown a:hover {
      background: rgba(196,164,132,0.12);
      color: #fff;
    }

    .nd-divider {
      height: 1px;
      background: rgba(196,164,132,0.12);
      margin: 0.4rem 0.5rem;
    }

    /* ── FORM CARD ── */
    .auth-card {
      background: rgba(250,247,242,1);
      border-radius: 24px;
      padding: 2.2rem 2.5rem 2rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 40px 90px rgba(0,0,0,0.5), 0 0 0 1px rgba(196,164,132,0.15);
      position: relative;
      overflow: visible;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      border-radius: 24px 24px 0 0;
      background: linear-gradient(90deg, #6F4E37, #C4A484, #6F4E37);
    }

    /* Logo */
    .card-logo {
      text-align: center;
      margin-bottom: 0.7rem;
    }
    .card-logo img {
      height: 50px;
      width: auto;
      object-fit: contain;
      mix-blend-mode: multiply;
      transition: filter 0.3s;
    }
    body.dark-mode .card-logo img {
      mix-blend-mode: normal;
      filter: brightness(0) invert(1) sepia(0.3) saturate(0.8) hue-rotate(10deg) brightness(1.2);
    }
    .card-logo .tagline {
      font-size: 0.62rem;
      color: #8C7B6B;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.15rem;
      display: block;
    }

    /* Form title */
    .form-title {
      text-align: center;
      margin-bottom: 1.2rem;
    }
    .form-title h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      color: #1B1B1B;
      margin-bottom: 0.25rem;
    }
    .form-title p { font-size: 0.88rem; color: #6B5B4E; }

    /* Fields */
    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: #6F4E37;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
    .input-wrap { position: relative; }
    .input-wrap i.fi {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #C4A484;
      font-size: 0.95rem;
      pointer-events: none;
      z-index: 1;
    }
    .input-wrap input {
      width: 100%;
      padding: 0.8rem 2.8rem 0.8rem 2.6rem;
      background: #FFFFFF;
      border: 1.5px solid #CEBBAA;
      border-radius: 12px;
      font-size: 0.95rem;
      color: #1B1B1B;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.25s;
    }
    .input-wrap input:focus {
      border-color: #6F4E37;
      box-shadow: 0 0 0 3px rgba(111,78,55,0.10);
    }
    .input-wrap input::placeholder { color: #b0a090; }
    .eye-btn {
      position: absolute;
      right: 1rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: #C4A484;
      font-size: 0.95rem;
      padding: 0;
    }

    /* Remember row */
    .remember-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0.2rem 0 1rem;
      font-size: 0.85rem;
    }
    .remember-row label {
      display: flex; align-items: center; gap: 0.4rem;
      color: #6B5B4E; cursor: pointer;
      font-weight: 500;
    }
    .remember-row input[type="checkbox"] { accent-color: #6F4E37; }
    .remember-row a { color: #6F4E37; font-weight: 600; text-decoration: none; }
    .remember-row a:hover { text-decoration: underline; }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #6F4E37, #8B6147);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(111,78,55,0.38);
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(111,78,55,0.5); }
    .btn-submit:active { transform: translateY(0); }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 0.9rem 0;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8C7B6B;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: #CEBBAA;
    }

    /* Social */
    .social-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 0.75rem;
      margin-bottom: 0.9rem;
    }
    .social-btn {
      padding: 0.75rem;
      background: #FFFFFF;
      border: 1.5px solid #CEBBAA;
      border-radius: 12px;
      font-size: 1.1rem;
      color: #4a3f35;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .social-btn i {
      transition: color 0.2s;
    }
    .social-btn:hover {
      background: #F0E8DC;
      border-color: #C4A484;
    }
    .social-btn[aria-label="Google"]:hover i { color: #DB4437; }
    .social-btn[aria-label="Facebook"]:hover i { color: #1877F2; }
    .social-btn[aria-label="Apple"]:hover i { color: #000000; }

    /* Footer link */
    .form-footer {
      text-align: center;
      font-size: 0.88rem;
      color: #6B5B4E;
    }
    .form-footer a { color: #6F4E37; font-weight: 700; text-decoration: none; }
    .form-footer a:hover { text-decoration: underline; }

    /* ══════════════════════════════════════
       DARK MODE
     ══════════════════════════════════════ */
    body.dark-mode .page-bg {
      background:
        linear-gradient(rgba(8,4,2,0.82), rgba(8,4,2,0.85)),
        url('images/home_hero.jpg') center/cover no-repeat;
    }
    body.dark-mode .auth-card {
      background: #1C1009;
      box-shadow: 0 40px 90px rgba(0,0,0,0.7), 0 0 0 1px rgba(196,164,132,0.18);
    }
    body.dark-mode .form-title h1 { color: #FAF7F2; }
    body.dark-mode .form-title p { color: rgba(234,219,200,0.6); }
    body.dark-mode .card-logo .tagline { color: rgba(234,219,200,0.5); }
    body.dark-mode .card-logo img {
      mix-blend-mode: normal;
      filter: brightness(1.6) drop-shadow(0 2px 8px rgba(196,164,132,0.25));
    }
    .logo-dark { display: none !important; }
    .logo-light { display: inline-block !important; }
    body.dark-mode .logo-dark { display: inline-block !important; }
    body.dark-mode .logo-light { display: none !important; }
    body.dark-mode .field label { color: #C4A484; }
    body.dark-mode .input-wrap input {
      background: #261510;
      border-color: rgba(196,164,132,0.30);
      color: #FAF7F2;
    }
    body.dark-mode .input-wrap input::placeholder { color: #6a5547; }
    body.dark-mode .input-wrap input:focus {
      border-color: #C4A484;
      box-shadow: 0 0 0 3px rgba(196,164,132,0.12);
    }
    body.dark-mode .remember-row label { color: rgba(234,219,200,0.65); }
    body.dark-mode .remember-row a { color: #C4A484; }
    body.dark-mode .divider { color: rgba(196,164,132,0.6); }
    body.dark-mode .divider::before,
    body.dark-mode .divider::after { background: rgba(196,164,132,0.18); }
    body.dark-mode .social-btn {
      background: #261510;
      border-color: rgba(196,164,132,0.25);
      color: #EADBC8;
    }
    body.dark-mode .social-btn:hover {
      background: #341c0f;
      border-color: #C4A484;
    }
    body.dark-mode .social-btn[aria-label="Apple"]:hover i { color: #FFFFFF; }
    body.dark-mode .form-footer { color: rgba(234,219,200,0.5); }
    body.dark-mode .form-footer a { color: #C4A484; }

    /* Dark mode — top-right icon buttons become brighter */
    body.dark-mode .tr-btn {
      border-color: rgba(196,164,132,0.55);
      background: rgba(30,14,6,0.90);
    }

    /* ── MOBILE & TABLET RESPONSIVE ── */
    @media (max-width: 768px) {
      .auth-card {
        max-width: 440px;
        padding: 2rem 2rem 1.8rem;
      }
    }
    @media (max-width: 576px) {
      .auth-card {
        padding: 1.8rem 1.4rem 1.5rem;
        border-radius: 20px;
        margin: 0 auto;
        width: 95%;
      }
      .page-bg { padding: 6rem 0.5rem 2rem; }
      .form-title h1 { font-size: 1.5rem; }
      .form-title p { font-size: 0.82rem; }
      .field label { font-size: 0.7rem; }
      .input-wrap input {
        padding: 0.75rem 2.6rem 0.75rem 2.4rem;
        font-size: 0.9rem;
        border-radius: 10px;
      }
      .btn-submit {
        padding: 0.8rem;
        font-size: 0.9rem;
        border-radius: 10px;
      }
      .remember-row { font-size: 0.8rem; }
      .social-btn {
        padding: 0.65rem;
        font-size: 1rem;
        border-radius: 10px;
      }
      .form-footer { font-size: 0.82rem; }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       TOP-RIGHT CORNER ICONS
       Desktop: Dark + LTR only
       Mobile/Tablet: Hamburger only
  ══════════════════════════════════════ -->
  <div class="top-right-actions">
    <!-- Dark Mode — desktop only (mobile/tablet: inside hamburger) -->
    <button id="darkModeToggle" class="tr-btn tr-desktop-only" aria-label="Toggle dark mode" title="Dark Mode">
      <i class="far fa-moon"></i>
    </button>

    <!-- LTR / RTL — desktop only (mobile/tablet: inside hamburger) -->
    <button id="ltrToggleBtn" class="tr-btn tr-ltr tr-desktop-only" aria-label="LTR/RTL" title="Switch Direction">
      <i class="fas fa-language"></i> LTR
    </button>

    <!-- Hamburger — mobile/tablet only, opens nav dropdown -->
    <button id="menuToggle" class="tr-btn" aria-label="Open navigation" title="Menu">
      <i class="fas fa-bars"></i>
    </button>
  </div>

  <!-- ══════════════════════════════════════
       NAV DROPDOWN (hamburger menu, mobile/tablet only)
  ══════════════════════════════════════ -->
  <div class="nav-dropdown" id="navDropdown" role="dialog" aria-label="Navigation menu">

    <!-- Utility row: Dark mode + LTR inside hamburger -->
    <div class="nd-util-row">
      <button class="nd-util-btn" id="dmInMenu" aria-label="Toggle dark mode">
        <i class="far fa-moon"></i> <span>Dark</span>
      </button>
      <button class="nd-util-btn" id="ltrInMenu" aria-label="Toggle direction">
        <i class="fas fa-language"></i> <span>LTR</span>
      </button>
    </div>

    <span class="nd-label">Navigation</span>

    <a href="index.html"><i class="fas fa-home"></i> Home 1</a>
    <a href="home2.html"><i class="fas fa-house-chimney"></i> Home 2</a>
    <div class="nd-divider"></div>
    <a href="about.html"><i class="fas fa-circle-info"></i> About</a>
    <a href="books.html"><i class="fas fa-book"></i> Books</a>
    <a href="cafe.html"><i class="fas fa-mug-hot"></i> Cafe</a>
    <a href="events.html"><i class="fas fa-calendar-days"></i> Events</a>
    <a href="tradein.html"><i class="fas fa-arrows-rotate"></i> Trade-In</a>
    <a href="loyalty.html"><i class="fas fa-star"></i> Loyalty</a>
    <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
    <div class="nd-divider"></div>
    <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
    <a href="register.html"><i class="fas fa-user-plus"></i> Register</a>
  </div>

  <!-- ══════════════════════════════════════
       FULL BG PAGE — CENTERED FORM
  ══════════════════════════════════════ -->
  <div class="page-bg">
    <div class="auth-card">

      <!-- Logo -->
      <div class="card-logo">
        <img src="images/logo.svg" alt="Folio & Froth" class="logo-light">
        <img src="images/logo-dark.svg" alt="Folio & Froth" class="logo-dark">
        <span class="tagline">Books &amp; Coffee Haven</span>
      </div>

      <!-- Form title -->
      <div class="form-title">
        <h1>Welcome Back</h1>
        <p>Sign in to your Folio &amp; Froth account</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" novalidate>

        <div class="field">
          <label for="logEmail">Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope fi"></i>
            <input type="email" id="logEmail" placeholder="email@address.com" required autocomplete="email">
          </div>
        </div>

        <div class="field">
          <label for="logPassword">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock fi"></i>
            <input type="password" id="logPassword" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="eye-btn" id="togglePwd" aria-label="Show/hide password">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="remember-row">
          <label>
            <input type="checkbox" id="rememberMe"> Remember Me
          </label>
          <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-submit">
          <i class="fas fa-sign-in-alt" style="margin-right:0.4rem;"></i> Log In
        </button>

      </form>

      <div class="divider">OR SIGN IN WITH</div>

      <div class="social-grid">
        <button class="social-btn" aria-label="Google"><i class="fab fa-google"></i></button>
        <button class="social-btn" aria-label="Facebook"><i class="fab fa-facebook-f"></i></button>
        <button class="social-btn" aria-label="Apple"><i class="fab fa-apple"></i></button>
      </div>

      <p class="form-footer">
        Don't have an account? <a href="register.html">Create one free</a>
      </p>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* ══════════════════════════════════════
       DARK MODE (shared with site-wide localStorage)
    ══════════════════════════════════════ */
    const body = document.body;

    // Sync with site-wide theme setting
    function applyTheme(isDark) {
      body.classList.toggle('dark-mode', isDark);
      const moonIcons = document.querySelectorAll('#darkModeToggle i, #dmInMenu i');
      moonIcons.forEach(icon => {
        icon.className = isDark ? 'fas fa-sun' : 'far fa-moon';
      });
      const spans = document.querySelectorAll('#dmInMenu span');
      spans.forEach(s => s.textContent = isDark ? 'Light' : 'Dark');
    }

    // Load saved theme
    const savedTheme = localStorage.getItem('theme') || 'light';
    applyTheme(savedTheme === 'dark');

    // Dark mode toggle (top-right)
    document.getElementById('darkModeToggle').addEventListener('click', () => {
      const isDark = !body.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      applyTheme(isDark);
    });

    // Dark mode toggle (inside hamburger)
    document.getElementById('dmInMenu').addEventListener('click', () => {
      const isDark = !body.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      applyTheme(isDark);
    });

    /* ══════════════════════════════════════
       LTR / RTL
    ══════════════════════════════════════ */
    function applyDir(dir) {
      document.documentElement.setAttribute('dir', dir);
      localStorage.setItem('pp-dir', dir);
      const label = dir === 'rtl' ? 'RTL' : 'LTR';
      document.querySelectorAll('#ltrToggleBtn, #ltrInMenu').forEach(btn => {
        const sp = btn.querySelector('span');
        if (sp) sp.textContent = label;
        // update text node for #ltrToggleBtn (no span)
        btn.childNodes.forEach(n => {
          if (n.nodeType === 3 && n.textContent.trim()) n.textContent = ' ' + label;
        });
        const icon = btn.querySelector('i');
        if (icon) {
          icon.className = dir === 'rtl' ? 'fas fa-arrow-left-arrow-right' : 'fas fa-language';
        }
      });
    }

    const savedDir = localStorage.getItem('pp-dir') || 'ltr';
    applyDir(savedDir);

    document.getElementById('ltrToggleBtn').addEventListener('click', () => {
      const curr = document.documentElement.getAttribute('dir') || 'ltr';
      applyDir(curr === 'ltr' ? 'rtl' : 'ltr');
    });

    document.getElementById('ltrInMenu').addEventListener('click', () => {
      const curr = document.documentElement.getAttribute('dir') || 'ltr';
      applyDir(curr === 'ltr' ? 'rtl' : 'ltr');
    });

    /* ══════════════════════════════════════
       HAMBURGER MENU TOGGLE
    ══════════════════════════════════════ */
    const menuBtn  = document.getElementById('menuToggle');
    const navDrop  = document.getElementById('navDropdown');
    const menuIcon = menuBtn.querySelector('i');

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = navDrop.classList.toggle('open');
      menuIcon.className = isOpen ? 'fas fa-xmark' : 'fas fa-bars';
    });

    // Close when clicking outside
    document.addEventListener('click', (e) => {
      if (!navDrop.contains(e.target) && e.target !== menuBtn && !menuBtn.contains(e.target)) {
        navDrop.classList.remove('open');
        menuIcon.className = 'fas fa-bars';
      }
    });

    /* ══════════════════════════════════════
       SHOW / HIDE PASSWORD
    ══════════════════════════════════════ */
    const togglePwd = document.getElementById('togglePwd');
    const pwdInput  = document.getElementById('logPassword');
    togglePwd.addEventListener('click', () => {
      const vis = pwdInput.type === 'text';
      pwdInput.type = vis ? 'password' : 'text';
      togglePwd.querySelector('i').className = vis ? 'far fa-eye' : 'far fa-eye-slash';
    });
  </script>

</body>
</html>
