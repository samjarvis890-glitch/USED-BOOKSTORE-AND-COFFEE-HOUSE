<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="404 - Page Spilled. This chapter does not exist or has been moved.">
  <meta name="theme-color" content="#6F4E37">
  <title>404 - Page Spilled | Used Bookstore & Coffee House</title>
  
  <link rel="icon" type="image/png" href="images/favicon.svg">
  
  <!-- CDNs: Bootstrap 5, Tailwind CSS, FontAwesome 6, Google Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Local Stylesheets -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  
  <style>
    @keyframes spill {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(8px) rotate(-1deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    .anim-spill {
      animation: spill 4s ease-in-out infinite;
    }
  </style>
</head>
<body class="bg-[#f4f0eb] font-sans text-gray-800 transition-colors duration-300 flex flex-col min-h-screen">
  
  <main class="flex-grow flex items-center justify-center p-4 pt-32">
    <div class="max-w-md w-full glass-card p-8 md:p-12 text-center space-y-6 scroll-reveal">
      <!-- 404 Illustration -->
      <div class="relative overflow-hidden rounded-3xl h-60 bg-[#EADBC8] border border-[#C4A484]/30 flex items-center justify-center anim-spill">
        <img src="assets/images/404/404-hero.png" alt="404 Page Spilled Illustration" class="w-full h-full object-cover">
      </div>

      <!-- Message -->
      <div class="space-y-2">
        <span class="text-xs uppercase tracking-widest text-[#C4A484] font-bold">Error 404</span>
        <h1 class="text-3xl font-serif text-[#6F4E37] font-bold">This Chapter is Missing</h1>
        <p class="text-xs text-gray-500 max-w-sm mx-auto leading-relaxed">
          It looks like coffee was spilled on this page, or the chapter you are looking for has been read and moved.
        </p>
      </div>

      <!-- Navigation Action -->
      <div>
        <a href="index.html" class="inline-block px-8 py-3 rounded-full bg-[#6F4E37] text-white font-bold hover:bg-[#5a3e2b] transition-all shadow-md no-underline">
          Back to Home Shelf
        </a>
      </div>
    </div>
  </main>

  

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/darkmode.js"></script>
  <script src="assets/js/animations.js"></script>
</body>
</html>
